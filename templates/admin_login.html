{% extends 'base.html' %}

{% block content %}
<div class="auth-form" style="border-top: 4px solid var(--danger);">
    <h2>Admin Portal</h2>
    <p style="color: var(--text-muted); margin-bottom: 1.5rem;">Access restricted to authorized personnel.</p>
    <form method="POST">
        <div class="form-group">
            <label>Admin ID</label>
            <input type="text" name="voter_id" required>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" required>
        </div>
        <button type="submit" class="btn btn-block btn-danger">Secure Admin Login</button>
    </form>
    <p style="text-align: center; margin-top: 1rem; font-size: 0.9em; color: var(--text-muted)">
        Not an admin? <a href="{{ url_for('login') }}" style="color: var(--accent)">Voter Login</a>
    </p>
</div>
{% endblock %}
